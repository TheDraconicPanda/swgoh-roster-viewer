<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWGOH - Simple Category Test</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            padding: 20px;
            background: #000;
            color: #0f0;
            line-height: 1.6;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #0f0;
            color: #000;
            border: none;
            margin: 10px 0;
            font-weight: bold;
        }
        .output {
            background: #1a1a1a;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #0f0;
            max-height: 500px;
            overflow-y: auto;
        }
        .success { color: #0f0; }
        .error { color: #f00; }
        .warning { color: #ff0; }
        .info { color: #0ff; }
    </style>
</head>
<body>
    <h1>🔍 SWGOH Category Fetcher - Simple Test</h1>

    <button onclick="testDirectFetch()">Test 1: Direct Fetch (Simple)</button>
    <button onclick="testWithCORS()">Test 2: Fetch with CORS Headers</button>
    <button onclick="testFullMerge()">Test 3: Full Player + Categories Merge</button>

    <div id="output" class="output">
        <p class="info">Click a test button to begin...</p>
    </div>

    <script>
        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const color = type === 'error' ? 'error' : type === 'success' ? 'success' : type === 'warning' ? 'warning' : 'info';
            output.innerHTML += `<div class="${color}">${message}</div>`;
            output.scrollTop = output.scrollHeight;
        }

        function clear() {
            document.getElementById('output').innerHTML = '';
        }

        async function testDirectFetch() {
            clear();
            log('=== TEST 1: Direct Character API Fetch ===');
            log('Fetching https://swgoh.gg/api/characters/ ...', 'info');

            try {
                const response = await fetch('https://swgoh.gg/api/characters/');
                log(`Status: ${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');

                if (response.ok) {
                    const data = await response.json();
                    log(`✓ Successfully loaded ${data.length} characters`, 'success');

                    // Show first 5
                    log('\\nFirst 5 characters:', 'info');
                    data.slice(0, 5).forEach(char => {
                        log(`  ${char.name}: ${JSON.stringify(char.categories)}`, 'success');
                    });

                    // Find specific characters
                    const hermit = data.find(c => c.base_id === 'HERMITYODA');
                    const slkr = data.find(c => c.base_id === 'SUPREMELEADERKYLOREN');

                    log('\\nSpecific characters:', 'info');
                    if (hermit) log(`  Hermit Yoda: ${JSON.stringify(hermit.categories)}`, 'success');
                    if (slkr) log(`  SLKR: ${JSON.stringify(slkr.categories)}`, 'success');

                } else {
                    log(`✗ Failed to fetch: ${response.status}`, 'error');
                }
            } catch (error) {
                log(`✗ Error: ${error.message}`, 'error');
                console.error(error);
            }
        }

        async function testWithCORS() {
            clear();
            log('=== TEST 2: Fetch with CORS Headers ===');

            try {
                const response = await fetch('https://swgoh.gg/api/characters/', {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                log(`Status: ${response.status}`, response.ok ? 'success' : 'error');

                if (response.ok) {
                    const data = await response.json();
                    log(`✓ Loaded ${data.length} characters with CORS mode`, 'success');
                } else {
                    log(`✗ Failed: ${response.statusText}`, 'error');
                }
            } catch (error) {
                log(`✗ CORS Error: ${error.message}`, 'error');
                log('This might be a CORS restriction from the browser', 'warning');
            }
        }

        async function testFullMerge() {
            clear();
            log('=== TEST 3: Full Player + Categories Merge ===');
            const allyCode = '881241752';

            try {
                // Step 1: Fetch player data
                log('Step 1: Fetching player data...', 'info');
                const playerResp = await fetch(`https://swgoh.gg/api/player/${allyCode}/`);

                if (!playerResp.ok) {
                    throw new Error(`Player API failed: ${playerResp.status}`);
                }

                const playerData = await playerResp.json();
                const characters = playerData.units.filter(u => u.data.combat_type === 1);
                log(`✓ Loaded ${characters.length} characters from player roster`, 'success');

                // Step 2: Fetch base character data
                log('\\nStep 2: Fetching character categories...', 'info');
                const charsResp = await fetch('https://swgoh.gg/api/characters/');

                if (!charsResp.ok) {
                    throw new Error(`Characters API failed: ${charsResp.status}`);
                }

                const baseChars = await charsResp.json();
                log(`✓ Loaded ${baseChars.length} character definitions`, 'success');

                // Step 3: Create lookup map
                log('\\nStep 3: Creating lookup map...', 'info');
                const baseCharMap = {};
                baseChars.forEach(char => {
                    baseCharMap[char.base_id] = char;
                });
                log(`✓ Created lookup map with ${Object.keys(baseCharMap).length} entries`, 'success');

                // Step 4: Merge
                log('\\nStep 4: Merging categories...', 'info');
                let mergedCount = 0;
                characters.forEach(char => {
                    const baseChar = baseCharMap[char.data.base_id];
                    if (baseChar && baseChar.categories) {
                        char.data.categories = baseChar.categories;
                        mergedCount++;
                    }
                });
                log(`✓ Merged categories for ${mergedCount} / ${characters.length} characters`, mergedCount > 0 ? 'success' : 'error');

                // Step 5: Show results
                log('\\nStep 5: Results - First 10 characters:', 'info');
                characters.slice(0, 10).forEach((char, i) => {
                    const cats = char.data.categories || [];
                    const catStr = cats.length > 0 ? JSON.stringify(cats) : 'NO CATEGORIES';
                    const color = cats.length > 0 ? 'success' : 'error';
                    log(`  ${i+1}. ${char.data.name}: ${catStr}`, color);
                });

                // Extract all unique tags
                const tagSet = new Set();
                characters.forEach(char => {
                    if (char.data.categories && Array.isArray(char.data.categories)) {
                        char.data.categories.forEach(tag => tagSet.add(tag));
                    }
                });

                const tags = Array.from(tagSet).sort();
                log(`\\n✓ Found ${tags.length} unique tags:`, tags.length > 0 ? 'success' : 'error');
                if (tags.length > 0) {
                    log(`  ${tags.join(', ')}`, 'success');
                }

                if (mergedCount === 0) {
                    log('\\n⚠ WARNING: No categories were merged!', 'error');
                    log('This might indicate a data structure mismatch', 'warning');
                }

            } catch (error) {
                log(`\\n✗ Error: ${error.message}`, 'error');
                console.error(error);
            }
        }
    </script>
</body>
</html>
